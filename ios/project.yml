# XcodeGen spec — `brew install xcodegen && xcodegen generate` in this directory, then open NewsFirst.xcodeproj
name: NewsFirst
options:
  bundleIdPrefix: com.ant2555
  deploymentTarget:
    iOS: "18.0"
packages:
  Inject: # in-simulator hot reload (pair with the InjectionIII app)
    url: https://github.com/krzysztofzablocki/Inject.git
    from: 1.5.2
  MisakiSwift: # Kokoro's G2P (text → phonemes), supports British English.
    # VENDORED: upstream ships a resource folder literally named "Resources", which
    # makes codesign treat the shallow iOS bundle as a malformed deep bundle
    # ("bundle format unrecognized"). Local copy renames it to G2PData.
    path: Vendor/MisakiSwift
  onnxruntime: # CPU inference for the Kokoro-82M studio voice (works on simulator too)
    url: https://github.com/microsoft/onnxruntime-swift-package-manager.git
    from: 1.16.0
targets:
  NewsFirst:
    type: application
    platform: iOS
    scheme: {}   # resource-bundle codesign needs scheme+destination builds, not -target -sdk
    sources: [NewsFirst]
    entitlements:
      path: NewsFirst/NewsFirst.entitlements
      properties:
        com.apple.developer.applesignin: [Default]   # portal capability ticked 2026-07-05
        aps-environment: development                 # App Store export re-signs to production
        com.apple.developer.usernotifications.time-sensitive: true   # breaking alerts
    dependencies:
      - package: Inject
      - package: MisakiSwift
      - package: onnxruntime
        product: onnxruntime
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Same bundle id as v2 — v3 ships as an UPDATE to the existing App Store app
        # (keeps the NewsFirst name, listing, and existing installs; version becomes 2.0.0)
        PRODUCT_BUNDLE_IDENTIFIER: com.ant2555.newsfirst
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIBackgroundModes: audio   # briefing keeps playing when the app is backgrounded
        # v3 ships as an UPDATE to the live listing (v2 is at 1.0.4)
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO   # standard HTTPS only — skips the TestFlight compliance stop
        DEVELOPMENT_TEAM: 6W4ZBLPC9M
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"   # v2.5 shipped universal — updates may never drop iPad
        INFOPLIST_KEY_UIRequiresFullScreen: YES   # full-screen exempts portrait-only from the iPad multitasking orientation rule
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
      configs:
        Debug:
          # InjectionIII hot reload — Debug only: the un-strippable indirect symbols
          # it creates fail the Release archive's strip step.
          OTHER_LDFLAGS: "-Xlinker -interposable"
# Phase 3 additions: PostHog + supabase-swift packages, push + time-sensitive entitlements,
# a NotificationService extension target (image pre-caching), RevenueCat in phase 5.
